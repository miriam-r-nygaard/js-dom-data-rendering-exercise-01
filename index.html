<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CineFlex Movies</title>
    <link rel="stylesheet" href="css/style.css" />
    <!--link til CSS fil (opg.1) -->
  </head>
  <body>
    <h1>CineFlex Movies</h1>
    <form>
      <label for="g-search">Søg</label>
      <input type="text" id="g-search" name="gsearch" />
      <input type="submit" value="Søg" />
      <label for="category-select">Vælg Kategori</label>
      <select id="category-select">
        <option value="all">Alle</option>
        <option value="comedy">Comedy</option>
        <option value="drama">Drama</option>
        <option value="horror">Horror</option>
        <option value="science-fiction">Science-Fiction</option>
        <option value="action">Action</option>
      </select>
    </form>
    <section id="movies-container"></section>
    <script src="js/movies-script.js"></script>
    <!--link til JS fil (opg.1) -->
  </body>
</html>
